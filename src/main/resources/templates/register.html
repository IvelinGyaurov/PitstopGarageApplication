<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - PitStop Garage</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="auth-card">
    <h1>PitStop Garage</h1>
    <h2>Register</h2>

    <p class="alert error" th:if="${errorMessage}" th:text="${errorMessage}"></p>

    <form th:action="@{/register}" th:object="${registerRequest}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <label for="username">Username</label>
        <input id="username" th:field="*{username}" type="text"/>
        <span class="field-error" th:errors="*{username}"></span>

        <label for="email">Email</label>
        <input id="email" th:field="*{email}" type="email"/>
        <span class="field-error" th:errors="*{email}"></span>

        <label for="password">Password</label>
        <input id="password" th:field="*{password}" type="password"/>
        <span class="field-error" th:errors="*{password}"></span>

        <button type="submit">Create account</button>
    </form>

    <p class="footer-link">Already have an account? <a th:href="@{/login}">Login here</a></p>
</div>
</body>
</html>
