<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - PitStop Garage</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="auth-card">
    <h1>PitStop Garage</h1>
    <h2>Login</h2>

    <p class="alert success" th:if="${param.registered}">Registration successful. Please sign in.</p>
    <p class="alert success" th:if="${param.logout}">You have been logged out.</p>
    <p class="alert error" th:if="${param.error}">Invalid username or password.</p>

    <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <label for="username">Username</label>
        <input id="username" name="username" type="text" required minlength="3" maxlength="20"/>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" required minlength="4" maxlength="20"/>

        <button type="submit">Sign in</button>
    </form>

    <p class="footer-link">No account? <a th:href="@{/register}">Register here</a></p>
</div>
</body>
</html>
